<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>
  <title>InnerWhispers Signup</title>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- CSS -->
  <link rel="stylesheet"
        href="css/dashboard.css"/>
</head>
<body class="bg-[#111827]
             min-h-screen
             flex items-center
             justify-center
             text-white">
<!--
     SIGNUP CARD
-->
<div class="w-full max-w-md
            bg-[#1F2937]
            rounded-3xl
            p-8">
  <!-- IMAGE -->
  <img src="assets/login-illustration.png"
       class="w-48 mx-auto mb-6"/>
  <!-- TITLE -->
  <h1 class="text-3xl font-bold text-center mb-8">
    Create Account
  </h1>
  <!-- NAME -->
  <div class="mb-4">
    <label class="form-label">
      Full Name
    </label>
    <input type="text"
           id="name"
           class="form-input"/>
  </div>
  <!-- EMAIL -->
  <div class="mb-4">
    <label class="form-label">
      Email
    </label>
    <input type="email"
           id="email"
           class="form-input"/>
  </div>
  <!-- PASSWORD -->
  <div class="mb-6">
    <label class="form-label">
      Password
    </label>
    <input type="password"
           id="password"
           class="form-input"/>
  </div>
  <!-- BUTTON -->
  <button onclick="handleSignup()"
          class="save-btn w-full">
    Create Account
  </button>
  <!-- LOGIN LINK -->
  <p class="text-center text-sm text-white/50 mt-6">
    Already have an account?
    <a href="login.html"
       class="text-purple-400">
      Login
    </a>
  </p>
</div>
<!--
     AUTH JS
-->
<script src="js/auth.js"></script>
<script>
/* 
   HANDLE SIGNUP
*/
function handleSignup() {
  const name =
  document.getElementById('name').value;
  const email =
  document.getElementById('email').value;
  const password =
  document.getElementById('password').value;
  const userData = {
    name,
    email,
    password
  };
  registerUser(userData);
  alert('Account created successfully!');
  window.location.href =
  'login.html';
}
</script>
</body>
</html>
